<!DOCTYPE html>
<html>
<head>
    <title>Luxury Auto Sales</title>

    <style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(to bottom, #0a0a0a, #111);
    color: white;
}

/* Subtle gold glow overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,215,0,0.05), transparent 70%);
    z-index: 0;
}

/* ===== HEADER ===== */
header {
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid rgba(255,215,0,0.2);
    position: sticky;
    top: 0;
    z-index: 10;
}

h1 {
    margin: 0;
    color: gold;
    letter-spacing: 2px;
}

/* NAV */
nav a {
    color: gold;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover {
    color: white;
    text-shadow: 0 0 10px gold;
}

/* ===== HERO ===== */
.hero {
    text-align: center;
    padding: 120px 20px;
    background: url("https://maynardsgarage.com/wp-content/uploads/2022/09/Lamborghini-Showroom_Exterior-e1663179206723.jpg") no-repeat center/cover;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
}

.hero h2, .hero p {
    position: relative;
    z-index: 1;
}

.hero h2 {
    font-size: 40px;
    color: gold;
}

.hero p {
    font-size: 18px;
}

/* ===== CONTAINER ===== */
.container {
    padding: 40px 20px;
    position: relative;
    z-index: 1;
}

h2 {
    color: gold;
    text-align: center;
}

/* ===== INVENTORY GRID ===== */
.inventory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

/* CAR CARD */
.car-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 15px;
    overflow: hidden;
    backdrop-filter: blur(8px);
    transition: 0.3s ease;
}

.car-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 10px 25px rgba(255,215,0,0.2);
}

/* IMAGE */
.car-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* CARD CONTENT */
.car-info {
    padding: 15px;
    text-align: center;
}

.car-info h3 {
    margin: 10px 0;
    color: gold;
}

.price {
    font-size: 18px;
    margin: 5px 0 15px;
}

/* BUTTON */
button {
    background: linear-gradient(45deg, gold, #d4af37);
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 25px;
    transition: 0.3s;
}

button:hover {
    background: white;
    color: black;
    box-shadow: 0 0 10px gold;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 20px;
    background: black;
    margin-top: 40px;
    border-top: 1px solid rgba(255,215,0,0.2);
}
    </style>
